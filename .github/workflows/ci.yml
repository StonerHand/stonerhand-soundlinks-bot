name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyflakes

      - name: Lint
        run: python -m pyflakes src api tests

      - name: Tests
        run: python -m unittest discover -s tests -v
        env:
          PYTHONPATH: src

      - name: Mini App JS syntax
        run: node --check webapp/app.js

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Studio smoke test
        run: python tests/e2e/smoke.py
