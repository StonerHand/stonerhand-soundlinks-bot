<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="'JetBrains Mono', ui-monospace, monospace">
  <defs>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C97A1E"/><stop offset="1" stop-color="#8B4E10"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a2a14"/><stop offset=".55" stop-color="#1c1408"/><stop offset="1" stop-color="#0f0b05"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="640" height="400" rx="18" fill="#0D0D0E"/>
  <rect width="640" height="400" rx="18" fill="none" stroke="#2B2D31"/>
  <ellipse cx="320" cy="-40" rx="260" ry="120" fill="#C97A1E" opacity=".07"/>

  <!-- header -->
  <rect x="24" y="24" width="40" height="40" rx="11" fill="url(#amber)"/>
  <text x="44" y="50" text-anchor="middle" font-size="19">🎛</text>
  <text x="76" y="43" fill="#F4F4F1" font-size="21" font-family="'Unbounded', sans-serif" font-weight="600">Студия</text>
  <circle cx="80" cy="56" r="2.6" fill="#C97A1E">
    <animate attributeName="opacity" values="1;.3;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="89" y="59" fill="#8C8C88" font-size="9" letter-spacing="1.5">STONERHAND SOUNDLINKS</text>

  <!-- search bar -->
  <rect x="24" y="82" width="592" height="42" rx="13" fill="#17181A" stroke="#2B2D31"/>
  <text x="42" y="108" fill="#8C8C88" font-size="14">⌕</text>
  <text x="62" y="108" fill="#F4F4F1" font-size="14" letter-spacing=".5">sleep dragonaut<tspan fill="#C97A1E">▍</tspan></text>
  <!-- typing reveal -->
  <rect x="62" y="88" width="150" height="30" fill="#17181A">
    <animate attributeName="x" values="62;62;212;212;212;62" keyTimes="0;.04;.22;.9;.96;1" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="width" values="150;150;0;0;0;150" keyTimes="0;.04;.22;.9;.96;1" dur="9s" repeatCount="indefinite"/>
  </rect>
  <rect x="574" y="88" width="34" height="30" rx="9" fill="#C97A1E"/>
  <text x="591" y="108" text-anchor="middle" fill="#0D0D0E" font-size="14" font-weight="700">⌕</text>

  <!-- vinyl loader -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;.24;.28;.42;.46;1" dur="9s" repeatCount="indefinite"/>
    <g transform="translate(320,250)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1.8s" repeatCount="indefinite"/>
        <circle r="86" fill="#111113" stroke="#2B2D31" stroke-width="2"/>
        <circle r="70" fill="none" stroke="#1a1a1c" stroke-width="1.4"/>
        <circle r="56" fill="none" stroke="#1a1a1c" stroke-width="1.4"/>
        <circle r="42" fill="none" stroke="#1a1a1c" stroke-width="1.4"/>
        <circle r="24" fill="#202226"/>
        <circle r="20" fill="none" stroke="#C97A1E" stroke-width=".6" opacity=".5"/>
        <ellipse cx="-28" cy="-38" rx="16" ry="6" fill="#fff" opacity=".05" transform="rotate(-30)"/>
      </g>
      <text y="-2" text-anchor="middle" fill="#C97A1E" font-size="8.5" letter-spacing="1">STUDIO</text>
      <text y="9" text-anchor="middle" fill="#8C8C88" font-size="6">33⅓ RPM</text>
    </g>
    <text x="320" y="368" text-anchor="middle" fill="#8C8C88" font-size="10" letter-spacing="2.5">ИЩЕМ ТРЕК...</text>
  </g>

  <!-- result card -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.44;.5;.95;1" dur="9s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 16;0 16;0 0;0 0;0 16" keyTimes="0;.44;.52;.95;1" dur="9s" repeatCount="indefinite"/>

    <rect x="24" y="142" width="592" height="234" rx="16" fill="#202226" stroke="#C97A1E" stroke-opacity=".35"/>

    <!-- artwork -->
    <rect x="40" y="160" width="198" height="198" rx="12" fill="url(#cover)" stroke="#2B2D31"/>
    <g transform="translate(139,259)" opacity=".9">
      <circle r="58" fill="#0D0D0E" opacity=".65"/>
      <circle r="58" fill="none" stroke="#C97A1E" stroke-width="1" opacity=".5"/>
      <circle r="16" fill="#202226"/>
      <circle r="5" fill="#C97A1E"/>
    </g>
    <!-- play button + ring -->
    <g transform="translate(214,334)">
      <circle r="19" fill="#0D0D0E" opacity=".85"/>
      <circle r="19" fill="none" stroke="#E5C38A" stroke-width="2.5" stroke-dasharray="119.4" stroke-linecap="round" transform="rotate(-90)">
        <animate attributeName="stroke-dashoffset" values="119.4;119.4;119.4;0" keyTimes="0;.5;.52;1" dur="9s" repeatCount="indefinite"/>
      </circle>
      <text y="5" text-anchor="middle" fill="#E5C38A" font-size="13">▶</text>
    </g>
    <!-- VU bars -->
    <g fill="#E5C38A" transform="translate(52,330)">
      <rect x="0" width="4" rx="2" height="20" y="0">
        <animate attributeName="height" values="6;20;6" dur=".55s" repeatCount="indefinite"/>
        <animate attributeName="y" values="14;0;14" dur=".55s" repeatCount="indefinite"/>
      </rect>
      <rect x="8" width="4" rx="2">
        <animate attributeName="height" values="18;7;18" dur=".62s" repeatCount="indefinite"/>
        <animate attributeName="y" values="2;13;2" dur=".62s" repeatCount="indefinite"/>
      </rect>
      <rect x="16" width="4" rx="2">
        <animate attributeName="height" values="10;19;10" dur=".5s" repeatCount="indefinite"/>
        <animate attributeName="y" values="10;1;10" dur=".5s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- post text -->
    <text x="262" y="192" fill="#8C8C88" font-size="13">📻 · <tspan fill="#F4F4F1" font-weight="700">Sleep</tspan></text>
    <text x="262" y="218" fill="#F4F4F1" font-size="19" font-weight="700">Dragonaut · 1992</text>
    <text x="262" y="244" fill="#E5C38A" font-size="12" font-style="italic">кнопки ниже, трек ждет</text>
    <text x="262" y="266" fill="#2AABEE" font-size="11" opacity=".85">#stonerhand #track #doom #metal</text>

    <!-- platform buttons -->
    <g font-size="12" fill="#F4F4F1">
      <g>
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;.55;.6" dur="9s" repeatCount="indefinite"/>
        <rect x="262" y="282" width="164" height="34" rx="10" fill="#17181A" stroke="#2B2D31"/>
        <rect x="272" y="290" width="18" height="18" rx="5" fill="#1DB954" opacity=".18" stroke="#1DB954" stroke-opacity=".4"/>
        <text x="281" y="303" text-anchor="middle" fill="#1DB954" font-size="10" font-weight="700">S</text>
        <text x="298" y="304">Spotify</text>
      </g>
      <g>
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;.58;.63" dur="9s" repeatCount="indefinite"/>
        <rect x="436" y="282" width="164" height="34" rx="10" fill="#17181A" stroke="#2B2D31"/>
        <rect x="446" y="290" width="18" height="18" rx="5" fill="#FA2D48" opacity=".18" stroke="#FA2D48" stroke-opacity=".4"/>
        <text x="455" y="303" text-anchor="middle" fill="#FA2D48" font-size="10" font-weight="700">A</text>
        <text x="472" y="304">Apple Music</text>
      </g>
      <g>
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;.61;.66" dur="9s" repeatCount="indefinite"/>
        <rect x="262" y="322" width="164" height="34" rx="10" fill="#17181A" stroke="#2B2D31"/>
        <rect x="272" y="330" width="18" height="18" rx="5" fill="#A238FF" opacity=".18" stroke="#A238FF" stroke-opacity=".4"/>
        <text x="281" y="343" text-anchor="middle" fill="#A238FF" font-size="10" font-weight="700">D</text>
        <text x="298" y="344">Deezer</text>
      </g>
      <g>
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;.64;.69" dur="9s" repeatCount="indefinite"/>
        <rect x="436" y="322" width="164" height="34" rx="10" fill="rgba(201,122,30,.06)" stroke="#C97A1E" stroke-opacity=".3"/>
        <text x="518" y="344" text-anchor="middle" fill="#E5C38A" font-weight="600">🪩 Все платформы</text>
      </g>
    </g>
  </g>
</svg>
