<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="'JetBrains Mono', ui-monospace, monospace">
  <defs>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C97A1E"/><stop offset="1" stop-color="#8B4E10"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a3a5a"/><stop offset=".5" stop-color="#2a1c2e"/><stop offset="1" stop-color="#120b16"/>
    </linearGradient>
    <linearGradient id="covergrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset=".35" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity=".6"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="640" height="400" rx="18" fill="#0D0D0E"/>
  <rect width="640" height="400" rx="18" fill="none" stroke="#2B2D31"/>
  <ellipse cx="320" cy="-40" rx="280" ry="130" fill="#C97A1E" opacity=".06"/>

  <!-- header -->
  <rect x="24" y="24" width="40" height="40" rx="12" fill="url(#amber)"/>
  <circle cx="44" cy="44" r="11" fill="none" stroke="#0D0D0E" stroke-width="2.4"/>
  <circle cx="44" cy="44" r="3.4" fill="#0D0D0E"/>
  <text x="76" y="43" fill="#F4F4F1" font-size="21" font-family="'Unbounded','Golos Text',sans-serif" font-weight="600">Студия</text>
  <circle cx="80" cy="56" r="2.6" fill="#C97A1E">
    <animate attributeName="opacity" values="1;.3;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="89" y="59" fill="#8C8C88" font-size="9" letter-spacing="1.5">STONERHAND SOUNDLINKS</text>
  <!-- admin pill -->
  <rect x="556" y="30" width="60" height="26" rx="9" fill="#C97A1E" opacity=".12"/>
  <rect x="556" y="30" width="60" height="26" rx="9" fill="none" stroke="#C97A1E" stroke-opacity=".33"/>
  <text x="586" y="47" text-anchor="middle" fill="#C97A1E" font-size="10" letter-spacing="1">ADMIN</text>

  <!-- search bar -->
  <rect x="24" y="82" width="592" height="42" rx="14" fill="#17181A" stroke="#2B2D31"/>
  <circle cx="46" cy="103" r="6" fill="none" stroke="#8C8C88" stroke-width="1.6"/>
  <line x1="50.5" y1="107.5" x2="54" y2="111" stroke="#8C8C88" stroke-width="1.6" stroke-linecap="round"/>
  <text x="66" y="108" fill="#F4F4F1" font-size="14" letter-spacing=".5">sleep dragonaut<tspan fill="#C97A1E">▍</tspan></text>
  <rect x="66" y="88" width="150" height="30" fill="#17181A">
    <animate attributeName="x" values="66;66;216;216;216;66" keyTimes="0;.04;.22;.9;.96;1" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="width" values="150;150;0;0;0;150" keyTimes="0;.04;.22;.9;.96;1" dur="9s" repeatCount="indefinite"/>
  </rect>

  <!-- vinyl loader -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;.24;.28;.42;.46;1" dur="9s" repeatCount="indefinite"/>
    <g transform="translate(320,248)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1.8s" repeatCount="indefinite"/>
        <circle r="46" fill="none" stroke="url(#amber)" stroke-width="5" stroke-dasharray="60 220" stroke-linecap="round"/>
        <circle r="46" fill="#141416"/>
        <circle r="16" fill="#0D0D0E"/>
        <circle r="4" fill="#C97A1E"/>
      </g>
    </g>
    <text x="320" y="332" text-anchor="middle" fill="#8C8C88" font-size="10" letter-spacing="2.5">ИЩЕМ РЕЛИЗ…</text>
  </g>

  <!-- result card (new design) -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.44;.5;.95;1" dur="9s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 16;0 16;0 0;0 0;0 16" keyTimes="0;.44;.52;.95;1" dur="9s" repeatCount="indefinite"/>

    <rect x="24" y="142" width="592" height="234" rx="20" fill="#202226" stroke="#2B2D31"/>

    <!-- cover with gradient + genre badge + play ring -->
    <clipPath id="cc"><rect x="40" y="158" width="198" height="198" rx="14"/></clipPath>
    <g clip-path="url(#cc)">
      <rect x="40" y="158" width="198" height="198" fill="url(#cover)"/>
      <circle cx="139" cy="250" r="42" fill="none" stroke="#fff" stroke-opacity=".08" stroke-width="8"/>
      <rect x="40" y="158" width="198" height="198" fill="url(#covergrad)"/>
    </g>
    <!-- genre badge -->
    <rect x="52" y="170" width="98" height="22" rx="8" fill="#000" opacity=".5"/>
    <text x="62" y="185" fill="#E5C38A" font-size="10" letter-spacing="1">DOOM METAL</text>
    <!-- 0:30 badge -->
    <rect x="182" y="170" width="46" height="20" rx="7" fill="#000" opacity=".55"/>
    <text x="205" y="184" text-anchor="middle" fill="#ffffff" opacity=".7" font-size="9">0:30</text>
    <!-- play button + progress ring -->
    <g transform="translate(212,330)">
      <circle r="20" fill="#0D0D0E" opacity=".82"/>
      <circle r="20" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="2.5"/>
      <circle r="20" fill="none" stroke="#C97A1E" stroke-width="2.5" stroke-dasharray="125.6" stroke-linecap="round" transform="rotate(-90)">
        <animate attributeName="stroke-dashoffset" values="125.6;125.6;125.6;0" keyTimes="0;.5;.52;1" dur="9s" repeatCount="indefinite"/>
      </circle>
      <polygon points="-5,-8 12,0 -5,8" fill="#fff"/>
    </g>

    <!-- post text -->
    <text x="262" y="196" fill="#F4F4F1" font-size="21" font-family="'Unbounded','Golos Text',sans-serif" font-weight="600">Dragonaut</text>
    <text x="262" y="220" fill="#8C8C88" font-size="13">📻 · Sleep · 1992</text>
    <text x="262" y="246" fill="#E5C38A" font-size="12" font-style="italic">кнопки ниже, трек ждет</text>
    <text x="262" y="270" fill="#8C8C88" font-size="11">#stonerhand  #doom  #metal  #1992</text>

    <!-- platform pills -->
    <g>
      <g>
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;.55;.6" dur="9s" repeatCount="indefinite"/>
        <rect x="262" y="286" width="168" height="32" rx="10" fill="#1DB954" fill-opacity=".1" stroke="#1DB954" stroke-opacity=".4"/>
        <rect x="272" y="294" width="16" height="16" rx="4" fill="#1DB954"/>
        <text x="280" y="306" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">S</text>
        <text x="296" y="306" fill="#1DB954" font-size="11" font-weight="700">Spotify</text>
      </g>
      <g>
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;.59;.64" dur="9s" repeatCount="indefinite"/>
        <rect x="438" y="286" width="168" height="32" rx="10" fill="#FA2D48" fill-opacity=".1" stroke="#FA2D48" stroke-opacity=".4"/>
        <rect x="448" y="294" width="16" height="16" rx="4" fill="#FA2D48"/>
        <text x="456" y="306" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">A</text>
        <text x="472" y="306" fill="#FA2D48" font-size="11" font-weight="700">Apple Music</text>
      </g>
      <g>
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;.63;.68" dur="9s" repeatCount="indefinite"/>
        <rect x="262" y="326" width="168" height="32" rx="10" fill="#A238FF" fill-opacity=".1" stroke="#A238FF" stroke-opacity=".4"/>
        <rect x="272" y="334" width="16" height="16" rx="4" fill="#A238FF"/>
        <text x="280" y="346" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">D</text>
        <text x="296" y="346" fill="#A238FF" font-size="11" font-weight="700">Deezer</text>
      </g>
      <g>
        <animate attributeName="opacity" values="0;0;1" keyTimes="0;.67;.72" dur="9s" repeatCount="indefinite"/>
        <rect x="438" y="326" width="168" height="32" rx="10" fill="#17181A" stroke="#2B2D31"/>
        <text x="522" y="346" text-anchor="middle" fill="#8C8C88" font-size="11">+ Все</text>
      </g>
    </g>
  </g>
</svg>
